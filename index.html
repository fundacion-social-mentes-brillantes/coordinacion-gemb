<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/pwa-192x192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#2b9678" />
    <meta name="description" content="Control de asistencia — Gimnasio Emocional Mentes Brillantes" />

    <!-- iOS: comportamiento como app instalada -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Coordinación" />

    <title>Asistencia GEMB</title>

    <!-- Aplica el tema guardado antes de pintar (evita parpadeo). -->
    <script>
      try {
        var t = localStorage.getItem('gemb-theme');
        if (t !== 'light' && t !== 'pink' && t !== 'dark') t = 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
